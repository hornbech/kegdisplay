# docker-compose.yml
services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - keg_data:/data
    env_file: .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  keg_data:
